<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Guechi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1f5;
    --card:#ffffff;
    --navy:#0f2742;       /* deep trust blue */
    --navy2:#16395f;
    --ink:#16202c;
    --soft:#5b6573;
    --line:#e4e8ee;
    --gold:#c8a04e;       /* subtle prestige accent */
    --tint:#f4f7fa;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Libre Franklin',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    padding:26px 16px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;max-width:392px;
    background:var(--card);
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 18px 48px -22px #0f274266, 0 0 0 1px #0f27420d;
  }

  /* navy header band */
  .head{
    background:linear-gradient(160deg,var(--navy),var(--navy2));
    padding:30px 28px 26px;
    text-align:center;
    position:relative;
  }
  .head::after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:3px;
    background:var(--gold);
  }
  .photo{
    width:108px;height:108px;border-radius:50%;object-fit:cover;
    border:3px solid #ffffff;
    box-shadow:0 6px 18px #0008;
    margin-bottom:16px;
  }
  .head h1{
    color:#fff;font-size:1.62rem;font-weight:700;letter-spacing:-.01em;
  }
  .head .role{
    color:#cdd9e8;font-size:.86rem;font-weight:500;margin-top:7px;
  }
  .head .stack{
    display:inline-block;margin-top:13px;
    color:var(--gold);font-size:.66rem;font-weight:600;
    letter-spacing:.16em;text-transform:uppercase;
  }

  .body{padding:24px 28px 26px;}

  .links{display:flex;flex-direction:column;gap:10px;}
  .links a{
    display:flex;align-items:center;gap:14px;text-decoration:none;
    color:var(--ink);
    padding:13px 15px;border-radius:8px;
    border:1px solid var(--line);background:var(--tint);
    transition:border-color .16s,background .16s;
  }
  .links a:hover{border-color:var(--navy);background:#fff;}
  .links a .ic{
    width:38px;height:38px;border-radius:7px;flex:0 0 auto;
    background:var(--navy);
    display:flex;align-items:center;justify-content:center;
  }
  .links a .ic svg{width:18px;height:18px;color:#fff;}
  .links a .txt{flex:1;display:flex;flex-direction:column;line-height:1.3;}
  .links a .txt .l{font-size:.66rem;color:var(--soft);letter-spacing:.08em;text-transform:uppercase;font-weight:600;}
  .links a .txt .v{font-size:.82rem;font-weight:600;color:var(--ink);overflow-wrap:anywhere;}
  .links a .arr{color:var(--navy);font-weight:700;font-size:1rem;}

  .btn{
    width:100%;margin-top:18px;font-family:'Libre Franklin',sans-serif;
    font-size:.95rem;font-weight:700;letter-spacing:.01em;
    padding:15px;border:none;border-radius:8px;cursor:pointer;
    color:#fff;background:var(--navy);
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:background .16s,transform .1s;
  }
  .btn:hover{background:var(--navy2);}
  .btn:active{transform:scale(.99);}
  .btn svg{width:18px;height:18px;}

  .loc{
    text-align:center;margin-top:18px;
    font-size:.68rem;color:var(--soft);letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  }

  @media (prefers-reduced-motion:reduce){.links a,.btn{transition:none;}}
</style>
</head>
<body>

    <header class="head">

      <h1>Khalil Guechi</h1>

      <span class="stack">AI · Computer Vision · Entrepreneurship</span>
    </header>

    <div class="body">
      <nav class="links">

          <span class="txt"><span class="l">Email</span><span class="v">khalil.guechi10<wbr>@gmail.com</span></span>

          <span class="ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14zM8.34 17V9.99H6.01V17h2.33zM7.18 8.96a1.35 1.35 0 1 0 0-2.7 1.35 1.35 0 0 0 0 2.7zM18 17v-3.84c0-2.05-1.1-3-2.56-3-1.18 0-1.71.65-2 1.11v-.95h-2.33V17h2.33v-3.91c0-.21.02-.41.08-.56.16-.41.54-.84 1.17-.84.82 0 1.15.63 1.15 1.55V17H18z"/></svg></span>
          <span class="txt"><span class="l">LinkedIn</span><span class="v">/in/khalil-guechi</span></span>
          <span class="arr">↗</span>
        </a>
      </nav>

      <button class="btn" id="addContact">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
        Add to Contacts
      </button>

      <p class="loc">Paris · Lyon · Sétif</p>
    </div>
  </main>

<script>

</body>
</html>
