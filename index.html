<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Guechi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14;
    --bg2:#0f1620;
    --card:#111923;
    --ink:#eef4fb;
    --muted:#8da2b8;
    --line:#1d2a38;
    --neon:#39ff8b;        /* vision green */
    --neon-dim:#39ff8b33;
    --cyan:#26d3ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    padding:24px 16px;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  /* ambient camera-feed grid */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:46px 46px;
    opacity:.35;
    mask-image:radial-gradient(circle at 50% 38%,#000 0%,transparent 78%);
    -webkit-mask-image:radial-gradient(circle at 50% 38%,#000 0%,transparent 78%);
  }
  /* scanning sweep line */
  body::after{
    content:"";position:fixed;left:0;right:0;height:140px;z-index:0;
    background:linear-gradient(180deg,transparent,var(--neon-dim),transparent);
    animation:sweep 5.5s linear infinite;pointer-events:none;
  }
  @keyframes sweep{0%{top:-140px}100%{top:100%}}

  .card{
    position:relative;z-index:1;
    width:100%;max-width:380px;
    background:linear-gradient(180deg,#121b26,#0d141d);
    border:1px solid var(--line);
    border-radius:20px;
    padding:30px 26px 26px;
    box-shadow:0 0 0 1px #0008,0 24px 60px -20px #000c,0 0 80px -40px var(--neon);
  }

  /* top status bar */
  .status{
    display:flex;justify-content:space-between;align-items:center;
    font-family:'JetBrains Mono',monospace;font-size:.62rem;
    letter-spacing:.12em;color:var(--muted);text-transform:uppercase;
    margin-bottom:22px;
  }
  .status .live{display:flex;align-items:center;gap:6px;color:var(--neon);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--neon);
    box-shadow:0 0 8px var(--neon);animation:blink 1.4s steps(1) infinite;}
  @keyframes blink{50%{opacity:.25}}

  /* photo + detection overlay */
  .scan{position:relative;width:150px;height:150px;margin:0 auto 8px;}
  .scan img{
    width:150px;height:150px;border-radius:14px;object-fit:cover;
    filter:saturate(1.05) contrast(1.03);
    display:block;
  }
  .frame{position:absolute;inset:0;pointer-events:none;}
  .frame .corner{position:absolute;width:22px;height:22px;border:2px solid var(--neon);
    opacity:0;animation:pop .35s ease forwards;}
  .frame .tl{top:-3px;left:-3px;border-right:0;border-bottom:0;animation-delay:.5s;}
  .frame .tr{top:-3px;right:-3px;border-left:0;border-bottom:0;animation-delay:.62s;}
  .frame .bl{bottom:-3px;left:-3px;border-right:0;border-top:0;animation-delay:.74s;}
  .frame .br{bottom:-3px;right:-3px;border-left:0;border-top:0;animation-delay:.86s;}
  @keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
  .tag{
    position:absolute;top:-11px;left:50%;transform:translateX(-50%) translateY(-4px);
    font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.08em;
    background:var(--neon);color:#06120a;padding:3px 7px;border-radius:5px;
    white-space:nowrap;font-weight:700;opacity:0;animation:pop .4s ease 1s forwards;
  }
  /* landmark dots */
  .lm{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--cyan);
    box-shadow:0 0 6px var(--cyan);opacity:0;animation:pop .3s ease forwards;}

  h1{font-size:1.7rem;font-weight:700;letter-spacing:-.02em;text-align:center;margin-top:14px;}
  .title{font-size:1rem;font-weight:500;color:var(--ink);text-align:center;margin-top:5px;}
  .subtitle{
    font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.04em;
    color:var(--neon);text-align:center;margin-top:8px;
  }

  .links{display:flex;flex-direction:column;gap:9px;margin-top:24px;}
  .links a{
    display:flex;align-items:center;gap:12px;text-decoration:none;
    font-size:.95rem;font-weight:500;color:var(--ink);
    padding:13px 15px;border-radius:11px;
    border:1px solid var(--line);background:#0e1620;
    transition:border-color .18s,background .18s,transform .1s;
  }
  .links a:hover{border-color:var(--neon);background:#0f1c20;}
  .links a:active{transform:scale(.99);}
  .links a svg{width:18px;height:18px;color:var(--neon);flex:0 0 auto;}
  .links a .lbl{flex:1;}
  .links a .meta{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.05em;}

  .btn-contact{
    width:100%;margin-top:16px;font-family:'Space Grotesk',sans-serif;
    font-size:1rem;font-weight:700;letter-spacing:.01em;
    padding:15px;border:none;border-radius:11px;cursor:pointer;
    color:#06120a;background:var(--neon);
    display:flex;align-items:center;justify-content:center;gap:9px;
    box-shadow:0 0 24px -6px var(--neon);
    transition:transform .1s,box-shadow .18s;
  }
  .btn-contact:hover{box-shadow:0 0 34px -4px var(--neon);}
  .btn-contact:active{transform:scale(.99);}
  .btn-contact svg{width:18px;height:18px;}

  .foot{
    text-align:center;margin-top:18px;
    font-family:'JetBrains Mono',monospace;font-size:.55rem;
    letter-spacing:.14em;color:#46586c;text-transform:uppercase;
  }

  @media (prefers-reduced-motion:reduce){
    body::after{animation:none;display:none;}
    .dot{animation:none;}
    .corner,.tag,.lm{animation:none;opacity:1;}
  }
</style>
</head>
<body>
